name: pytest-unit-contract

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  runtime-readiness:
    runs-on: macos-15
    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ~/.cache/huggingface
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      TOKENIZERS_PARALLELISM: "false"
      CUDA_VISIBLE_DEVICES: ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-feature-groups.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Cache Hugging Face and NLTK data
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/nltk_data
          key: ${{ runner.os }}-py310-runtime-readiness-v1

      - name: Install runtime dependencies
        run: python -m pip install -r requirements-feature-groups.txt

      - name: Validate Hugging Face token
        run: |
          test -n "$HF_TOKEN" || {
            echo "Missing HF_TOKEN GitHub Actions secret";
            exit 1;
          }

      - name: Log in to Hugging Face
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import login

          login(
              token=os.environ["HF_TOKEN"],
              add_to_git_credential=False,
          )
          PY

      - name: Download runtime models
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import snapshot_download

          token = os.environ["HF_TOKEN"]
          for repo_id in (
              "cardiffnlp/twitter-xlm-roberta-base-sentiment",
              "google/embeddinggemma-300m",
              "google/gemma-3-270m",
          ):
              kwargs = {"repo_id": repo_id, "revision": "main"}
              if repo_id.startswith("google/"):
                  kwargs["token"] = token
              snapshot_download(**kwargs)
          PY

      - name: Install spaCy language models
        run: |
          python -m spacy download en_core_web_sm
          python -m spacy download uk_core_news_sm

      - name: Download NLTK resources
        run: |
          python - <<'PY'
          import nltk

          nltk.download("punkt")
          nltk.download("averaged_perceptron_tagger")
          PY

      - name: Run runtime readiness suite
        run: pytest -q tests/runtime

  unit-contract:
    runs-on: macos-15
    needs: runtime-readiness
    env:
      PYTHONUNBUFFERED: "1"
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install unit-test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Run unit/contract pytest suite
        run: pytest -q tests/unit_contract

  feature-groups:
    runs-on: macos-15
    needs: runtime-readiness
    strategy:
      fail-fast: false
      matrix:
        language:
          - en
          - ua
    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ~/.cache/huggingface
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      TOKENIZERS_PARALLELISM: "false"
      CUDA_VISIBLE_DEVICES: ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-feature-groups.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Cache Hugging Face and NLTK data
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/nltk_data
          key: ${{ runner.os }}-py310-feature-groups-v1

      - name: Install feature-group dependencies
        run: python -m pip install -r requirements-feature-groups.txt

      - name: Validate Hugging Face token
        run: |
          test -n "$HF_TOKEN" || {
            echo "Missing HF_TOKEN GitHub Actions secret";
            exit 1;
          }

      - name: Log in to Hugging Face
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import login

          login(
              token=os.environ["HF_TOKEN"],
              add_to_git_credential=False,
          )
          PY

      - name: Install spaCy language models
        run: |
          python -m spacy download en_core_web_sm
          python -m spacy download uk_core_news_sm

      - name: Download NLTK resources
        run: |
          python - <<'PY'
          import nltk

          nltk.download("punkt")
          nltk.download("averaged_perceptron_tagger")
          PY

      - name: Run feature-group tests
        run: pytest -q tests/feature_groups --language ${{ matrix.language }}

  pipeline-smoke:
    runs-on: macos-15
    needs: runtime-readiness
    strategy:
      fail-fast: false
      matrix:
        language:
          - en
          - ua
    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ~/.cache/huggingface
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      TOKENIZERS_PARALLELISM: "false"
      CUDA_VISIBLE_DEVICES: ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-feature-groups.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Cache Hugging Face and NLTK data
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/nltk_data
          key: ${{ runner.os }}-py310-pipeline-smoke-v1

      - name: Install pipeline dependencies
        run: python -m pip install -r requirements-feature-groups.txt

      - name: Validate Hugging Face token
        run: |
          test -n "$HF_TOKEN" || {
            echo "Missing HF_TOKEN GitHub Actions secret";
            exit 1;
          }

      - name: Log in to Hugging Face
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import login

          login(
              token=os.environ["HF_TOKEN"],
              add_to_git_credential=False,
          )
          PY

      - name: Install spaCy language models
        run: |
          python -m spacy download en_core_web_sm
          python -m spacy download uk_core_news_sm

      - name: Download NLTK resources
        run: |
          python - <<'PY'
          import nltk

          nltk.download("punkt")
          nltk.download("averaged_perceptron_tagger")
          PY

      - name: Run pipeline smoke tests
        run: pytest -q tests/pipeline_smoke --language ${{ matrix.language }}

  cross-language-consistency:
    runs-on: macos-15
    needs:
      - unit-contract
      - feature-groups
      - pipeline-smoke
    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ~/.cache/huggingface
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      TOKENIZERS_PARALLELISM: "false"
      CUDA_VISIBLE_DEVICES: ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-feature-groups.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Cache Hugging Face and NLTK data
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/nltk_data
          key: ${{ runner.os }}-py310-cross-language-v1

      - name: Install cross-language dependencies
        run: python -m pip install -r requirements-feature-groups.txt

      - name: Validate Hugging Face token
        run: |
          test -n "$HF_TOKEN" || {
            echo "Missing HF_TOKEN GitHub Actions secret";
            exit 1;
          }

      - name: Log in to Hugging Face
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import login

          login(
              token=os.environ["HF_TOKEN"],
              add_to_git_credential=False,
          )
          PY

      - name: Install spaCy language models
        run: |
          python -m spacy download en_core_web_sm
          python -m spacy download uk_core_news_sm

      - name: Download NLTK resources
        run: |
          python - <<'PY'
          import nltk

          nltk.download("punkt")
          nltk.download("averaged_perceptron_tagger")
          PY

      - name: Run cross-language consistency tests
        run: pytest -q tests/cross_language
